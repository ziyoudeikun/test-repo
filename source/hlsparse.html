<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS工具箱 | 服务器资源浏览器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --primary-color: #3a86ff;
            --secondary-color: #8338ec;
            --success-color: #06d6a0;
            --warning-color: #ffd166;
            --danger-color: #ef476f;
            --dark-bg: #0d1b2a;
            --medium-bg: #1b263b;
            --light-bg: #415a77;
            --text-color: #e0e1dd;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --border-radius: 12px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            color: var(--text-color);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 头部 */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .logo-icon {
            font-size: 3.5rem;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0c0;
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto 20px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 25px;
            background: var(--medium-bg);
            color: var(--text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: var(--light-bg);
            transform: translateX(-5px);
        }
        
        /* 服务器资源浏览器样式 */
        .resource-browser {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .browser-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 10px;
        }
        
        /* 服务器配置区域 */
        .server-config {
            background: var(--medium-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
        }
        
        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .config-form {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-label {
            color: #a0a0c0;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-input {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--light-bg);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 12px 25px;
            background: var(--light-bg);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .action-btn:hover {
            background: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .action-btn.primary {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        
        .action-btn.success {
            background: var(--success-color);
        }
        
        .action-btn.warning {
            background: var(--warning-color);
            color: #333;
        }
        
        /* 服务器状态指示器 */
        .server-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #888;
        }
        
        .status-indicator.connected {
            background: var(--success-color);
            box-shadow: 0 0 10px rgba(6, 214, 160, 0.5);
        }
        
        .status-indicator.connecting {
            background: var(--warning-color);
            animation: pulse 1.5s infinite;
        }
        
        .status-indicator.error {
            background: var(--danger-color);
            box-shadow: 0 0 10px rgba(239, 71, 111, 0.5);
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* 资源列表区域 */
        .resources-section {
            background: var(--medium-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--card-shadow);
        }
        
        .resources-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .search-box {
            position: relative;
            width: 300px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 15px;
            padding-left: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--light-bg);
            border-radius: 8px;
            color: white;
        }
        
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0a0c0;
        }
        
        /* 资源网格 */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .resource-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .resource-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-color);
        }
        
        .resource-thumbnail {
            height: 200px;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .resource-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .resource-card:hover .resource-thumbnail img {
            transform: scale(1.05);
        }
        
        .thumbnail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8) 100%);
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .resource-card:hover .thumbnail-overlay {
            opacity: 1;
        }
        
        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .resource-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .resource-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-color);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .resource-description {
            color: #a0a0c0;
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        
        .resource-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.8rem;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
        }
        
        .meta-item i {
            width: 16px;
        }
        
        .resource-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-small {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .action-small:hover {
            background: var(--primary-color);
        }
        
        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0c0;
            grid-column: 1 / -1;
        }
        
        .loading-spinner {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0c0;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--light-bg);
        }
        
        /* 播放器页面 */
        .player-page {
            background: var(--dark-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .player-header h2 {
            color: var(--text-color);
            font-size: 1.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .player-container {
            position: relative;
            width: 100%;
            background: #000;
        }
        
        #video-player {
            width: 100%;
            height: 600px;
        }
        
        .player-info {
            padding: 25px;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .player-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            color: #a0a0c0;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-weight: 500;
        }
        
        /* 响应式设计 */
        @media (max-width: 1100px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .logo-icon {
                font-size: 3rem;
            }
            
            .resources-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
            
            #video-player {
                height: 500px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .browser-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .config-form {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                width: 100%;
            }
            
            .resources-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            #video-player {
                height: 400px;
            }
            
            .player-info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> 返回主页面
    </a>

    <!-- 服务器资源浏览器页面 -->
    <div id="function2-page" class="container">
        <header>
            <div class="logo">
                <i class="fas fa-server logo-icon"></i>
                <h1>服务器资源浏览器</h1>
            </div>
            <p class="subtitle">从服务器获取HLS视频资源列表，支持搜索、筛选和HLS标准播放流程。提供完整的视频播放和管理功能。</p>
        </header>

        <div class="resource-browser">
            <!-- 服务器配置区域 -->
            <div class="server-config" id="server-config">
                <div class="config-header">
                    <h2><i class="fas fa-cog"></i> 服务器配置</h2>
                    <div class="server-status" id="server-status">
                        <div class="status-indicator" id="status-indicator"></div>
                        <span id="status-text">未连接服务器</span>
                    </div>
                </div>
                
                <div class="config-form">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-link"></i> 服务器API地址
                        </label>
                        <input type="text" id="server-api-url" class="form-input" 
                               placeholder="https://example.com/api/videos" 
                               value="http://192.168.29.128:9009/video">
                        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">
                            提示：API应返回JSON格式的视频资源列表
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-key"></i> API密钥 (可选)
                        </label>
                        <input type="password" id="api-key" class="form-input" 
                               placeholder="如需认证，请输入API密钥">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-filter"></i> 每页显示数量
                        </label>
                        <select id="page-size" class="form-input">
                            <option value="10">10个/页</option>
                            <option value="20" selected>20个/页</option>
                            <option value="50">50个/页</option>
                            <option value="100">100个/页</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button class="action-btn primary" id="connect-btn">
                        <i class="fas fa-plug"></i> 连接服务器
                    </button>
                    <button class="action-btn" id="reset-btn">
                        <i class="fas fa-redo"></i> 重置配置
                    </button>
                    <button class="action-btn success" id="test-api-btn">
                        <i class="fas fa-vial"></i> 测试API
                    </button>
                </div>
            </div>

            <!-- 资源列表区域 -->
            <div class="resources-section" id="resources-section">
                <div class="resources-header">
                    <h2><i class="fas fa-list"></i> 视频资源列表 <span id="resource-count" style="color: #a0a0c0; font-size: 1rem;"></span></h2>
                    
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div class="search-box">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="search-input" class="search-input" placeholder="搜索视频...">
                        </div>
                        
                        <button class="action-btn" id="refresh-btn">
                            <i class="fas fa-sync-alt"></i> 刷新列表
                        </button>
                        
                        <button class="action-btn warning" id="show-mock-btn">
                            <i class="fas fa-database"></i> 使用模拟数据
                        </button>
                    </div>
                </div>
                
                <div class="resources-grid" id="resources-grid">
                    <div class="loading-state" id="loading-state">
                        <i class="fas fa-spinner fa-spin loading-spinner"></i>
                        <h3>正在加载资源列表...</h3>
                        <p>请稍候，正在从服务器获取视频资源</p>
                    </div>
                </div>
                
                <div style="display: none;" id="pagination-controls">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                        <button class="action-btn" id="prev-page-btn" disabled>
                            <i class="fas fa-chevron-left"></i> 上一页
                        </button>
                        
                        <div style="color: #a0a0c0;">
                            第 <span id="current-page">1</span> 页，共 <span id="total-pages">1</span> 页
                        </div>
                        
                        <button class="action-btn" id="next-page-btn" disabled>
                            下一页 <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 播放器页面 (初始隐藏) -->
            <div class="player-page" id="player-page" style="display: none;">
                <div class="player-header">
                    <h2 id="player-title">视频播放器</h2>
                    <button class="action-btn" id="back-to-list-btn">
                        <i class="fas fa-arrow-left"></i> 返回列表
                    </button>
                </div>
                
                <div class="player-container">
                    <video id="video-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                        <p class="vjs-no-js">
                            您的浏览器不支持HTML5视频播放，请使用现代浏览器如Chrome、Firefox或Edge。
                        </p>
                    </video>
                </div>
                
                <div class="player-info">
                    <div class="player-info-grid">
                        <div class="info-item">
                            <div class="info-label">视频标题</div>
                            <div class="info-value" id="player-video-title">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">视频格式</div>
                            <div class="info-value" id="player-video-format">HLS (.m3u8)</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">视频时长</div>
                            <div class="info-value" id="player-video-duration">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">视频大小</div>
                            <div class="info-value" id="player-video-size">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">分辨率</div>
                            <div class="info-value" id="player-video-resolution">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">码率</div>
                            <div class="info-value" id="player-video-bitrate">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">帧率</div>
                            <div class="info-value" id="player-video-framerate">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">编码格式</div>
                            <div class="info-value" id="player-video-codec">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">更新时间</div>
                            <div class="info-value" id="player-video-updated">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">服务器状态</div>
                            <div class="info-value" id="player-server-status">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Video.js 库 -->
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    
    <script>
        // 全局状态和配置
        const appState = {
            serverConfig: {
                apiUrl: 'http://192.168.29.128:9009/video',
                apiKey: '',
                pageSize: 20
            },
            resources: [],
            filteredResources: [],
            currentPage: 1,
            totalPages: 1,
            searchQuery: '',
            isConnected: false,
            isLoading: false,
            currentVideo: null,
            player: null
        };

        // 模拟数据 (当真实API不可用时使用)
        const mockResources = [
            {
                id: 1,
                name: "自然风光纪录片",
                description: "高清自然风光纪录片，展示世界各地的壮丽景色。",
                cover: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
                url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initResourceBrowser();
        });
        
        // 初始化服务器资源浏览器
        function initResourceBrowser() {
            // 加载保存的配置
            loadSavedConfig();
            
            // 设置事件监听
            setupEventListeners();
            
            // 初始化播放器
            initVideoPlayer();
            
            // 更新状态显示
            updateServerStatus('disconnected', '未连接服务器');
            
            // 显示初始状态
            showResourcesList();
        }
        
        // 加载保存的配置
        function loadSavedConfig() {
            const savedConfig = localStorage.getItem('hls-server-config');
            if (savedConfig) {
                try {
                    const config = JSON.parse(savedConfig);
                    appState.serverConfig = { ...appState.serverConfig, ...config };
                    
                    // 更新UI
                    document.getElementById('server-api-url').value = appState.serverConfig.apiUrl;
                    document.getElementById('api-key').value = appState.serverConfig.apiKey;
                    document.getElementById('page-size').value = appState.serverConfig.pageSize;
                } catch (error) {
                    console.error('加载配置失败:', error);
                }
            }
        }
        
        // 保存配置
        function saveConfig() {
            localStorage.setItem('hls-server-config', JSON.stringify(appState.serverConfig));
        }
        
        // 设置事件监听
        function setupEventListeners() {
            // 服务器配置相关
            document.getElementById('server-api-url').addEventListener('change', function() {
                appState.serverConfig.apiUrl = this.value;
                saveConfig();
            });
            
            document.getElementById('api-key').addEventListener('change', function() {
                appState.serverConfig.apiKey = this.value;
                saveConfig();
            });
            
            document.getElementById('page-size').addEventListener('change', function() {
                appState.serverConfig.pageSize = parseInt(this.value);
                saveConfig();
                if (appState.resources.length > 0) {
                    updatePagination();
                    renderResources();
                }
            });
            
            // 连接服务器按钮
            document.getElementById('connect-btn').addEventListener('click', connectToServer);
            
            // 重置配置按钮
            document.getElementById('reset-btn').addEventListener('click', resetConfig);
            
            // 测试API按钮
            document.getElementById('test-api-btn').addEventListener('click', testAPI);
            
            // 刷新列表按钮
            document.getElementById('refresh-btn').addEventListener('click', fetchResources);
            
            // 使用模拟数据按钮
            document.getElementById('show-mock-btn').addEventListener('click', useMockData);
            
            // 搜索框
            document.getElementById('search-input').addEventListener('input', function() {
                appState.searchQuery = this.value.toLowerCase();
                filterResources();
                renderResources();
            });
            
            // 分页按钮
            document.getElementById('prev-page-btn').addEventListener('click', goToPrevPage);
            document.getElementById('next-page-btn').addEventListener('click', goToNextPage);
            
            // 返回列表按钮
            document.getElementById('back-to-list-btn').addEventListener('click', showResourcesList);
            
            // 按Enter键连接服务器
            document.getElementById('server-api-url').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    connectToServer();
                }
            });
        }
        
        // 初始化视频播放器
        function initVideoPlayer() {
            appState.player = videojs('video-player', {
                controls: true,
                autoplay: false,
                preload: 'auto',
                fluid: true,
                html5: {
                    vhs: {
                        overrideNative: true
                    }
                },
                controlBar: {
                    volumePanel: {
                        inline: false
                    },
                    children: [
                        'playToggle',
                        'volumePanel',
                        'currentTimeDisplay',
                        'timeDivider',
                        'durationDisplay',
                        'progressControl',
                        'remainingTimeDisplay',
                        'playbackRateMenuButton',
                        'fullscreenToggle'
                    ]
                }
            });
            
            // 播放器错误处理
            appState.player.on('error', function() {
                const error = appState.player.error();
                if (error) {
                    console.error('播放器错误:', error);
                    updatePlayerInfo('server-status', '播放错误: ' + error.message);
                }
            });
            
            // 播放器加载完成
            appState.player.on('loadedmetadata', function() {
                const duration = appState.player.duration();
                if (duration) {
                    const minutes = Math.floor(duration / 60);
                    const seconds = Math.floor(duration % 60);
                    updatePlayerInfo('duration', `${minutes}:${seconds.toString().padStart(2, '0')}`);
                }
            });
        }
        
        // 连接服务器
        async function connectToServer() {
            // 更新服务器配置
            appState.serverConfig.apiUrl = document.getElementById('server-api-url').value.trim();
            appState.serverConfig.apiKey = document.getElementById('api-key').value.trim();
            appState.serverConfig.pageSize = parseInt(document.getElementById('page-size').value);
            
            if (!appState.serverConfig.apiUrl) {
                alert('请输入服务器API地址');
                return;
            }
            
            // 保存配置
            saveConfig();
            
            // 更新状态
            updateServerStatus('connecting', '正在连接服务器...');
            
            // 获取资源
            await fetchResources();
        }
        
        // 重置配置
        function resetConfig() {
            if (confirm('确定要重置服务器配置吗？这将清除所有已保存的设置。')) {
                localStorage.removeItem('hls-server-config');
                appState.serverConfig = {
                    apiUrl: 'https://api.npoint.io/6c44d7b6a2a5b5a5a5a5',
                    apiKey: '',
                    pageSize: 20
                };
                
                // 更新UI
                document.getElementById('server-api-url').value = appState.serverConfig.apiUrl;
                document.getElementById('api-key').value = '';
                document.getElementById('page-size').value = appState.serverConfig.pageSize;
                
                // 重置状态
                updateServerStatus('disconnected', '配置已重置');
                appState.resources = [];
                appState.filteredResources = [];
                appState.currentPage = 1;
                
                // 清空资源列表
                document.getElementById('resources-grid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-server empty-icon"></i>
                        <h3>未连接服务器</h3>
                        <p>请配置服务器API地址并连接服务器</p>
                    </div>
                `;
                
                document.getElementById('resource-count').textContent = '';
                document.getElementById('pagination-controls').style.display = 'none';
            }
        }
        
        // 测试API
        async function testAPI() {
            const apiUrl = document.getElementById('server-api-url').value.trim();
            
            if (!apiUrl) {
                alert('请输入服务器API地址');
                return;
            }
            
            updateServerStatus('connecting', '正在测试API连接...');
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    updateServerStatus('connected', 'API连接成功');
                    alert('API连接测试成功！服务器返回状态: ' + response.status);
                } else {
                    updateServerStatus('error', 'API连接失败: ' + response.status);
                    alert('API连接测试失败！服务器返回状态: ' + response.status);
                }
            } catch (error) {
                updateServerStatus('error', 'API连接错误: ' + error.message);
                alert('API连接测试失败: ' + error.message);
            }
        }
        
        // 获取资源列表
        async function fetchResources() {
            if (!appState.serverConfig.apiUrl) {
                alert('请先配置服务器API地址');
                return;
            }
            
            appState.isLoading = true;
            updateServerStatus('connecting', '正在获取资源列表...');
            showLoadingState();
            
            try {
                // 构建请求头
                const headers = {
                    'Content-Type': 'application/json'
                };
                
                // 添加API密钥（如果有）
                if (appState.serverConfig.apiKey) {
                    headers['Authorization'] = `Bearer ${appState.serverConfig.apiKey}`;
                }
                
                // 发送请求
                const response = await fetch(appState.serverConfig.apiUrl, {
                    method: 'GET',
                    headers: headers
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                // 解析JSON响应
                const data = await response.json();
                
                // 处理响应数据
                if (Array.isArray(data)) {
                    // 如果返回的是数组，直接使用
                    appState.resources = data;
                } else if (data.resources && Array.isArray(data.resources)) {
                    // 如果返回的是包含resources字段的对象
                    appState.resources = data.resources;
                } else if (data.videos && Array.isArray(data.videos)) {
                    // 如果返回的是包含videos字段的对象
                    appState.resources = data.videos;
                } else {
                    // 尝试提取任何可能是数组的字段
                    const arrayKeys = Object.keys(data).filter(key => Array.isArray(data[key]));
                    if (arrayKeys.length > 0) {
                        appState.resources = data[arrayKeys[0]];
                    } else {
                        throw new Error('API返回的数据格式不符合预期');
                    }
                }
                
                // 验证资源格式
                validateResources();
                
                // 应用搜索过滤
                filterResources();
                
                // 更新分页
                updatePagination();
                
                // 渲染资源
                renderResources();
                
                // 更新状态
                updateServerStatus('connected', `已加载 ${appState.resources.length} 个资源`);
                appState.isConnected = true;
                
            } catch (error) {
                console.error('获取资源失败:', error);
                updateServerStatus('error', '获取资源失败: ' + error.message);
                
                // 显示错误状态
                document.getElementById('resources-grid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle empty-icon"></i>
                        <h3>获取资源失败</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 15px;">您可以尝试使用模拟数据进行测试</p>
                        <button class="action-btn warning" id="use-mock-fallback" style="margin-top: 20px;">
                            <i class="fas fa-database"></i> 使用模拟数据
                        </button>
                    </div>
                `;
                
                // 为回退按钮添加事件
                document.getElementById('use-mock-fallback').addEventListener('click', useMockData);
            } finally {
                appState.isLoading = false;
            }
        }
        
        // 使用模拟数据
        function useMockData() {
            appState.resources = [...mockResources];
            
            // 验证资源格式
            validateResources();
            
            // 应用搜索过滤
            filterResources();
            
            // 更新分页
            updatePagination();
            
            // 渲染资源
            renderResources();
            
            // 更新状态
            updateServerStatus('connected', `已加载 ${appState.resources.length} 个模拟资源`);
            appState.isConnected = true;
            
            // 显示提示
            alert('正在使用模拟数据进行演示。要使用真实数据，请配置正确的服务器API地址。');
        }
        
        // 验证资源格式
        function validateResources() {
            // 确保每个资源都有必要的字段
            appState.resources = appState.resources.map(resource => {
                // 设置默认值
                return {
                    id: resource.id || Math.random().toString(36).substr(2, 9),
                    name: resource.name || resource.title || '未命名资源',
                    description: resource.description || resource.desc || '暂无描述',
                    cover: resource.cover || resource.thumbnail || resource.image || 'https://images.unsplash.com/photo-1536240478700-b869070f9279?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
                    url: resource.url || resource.videoUrl || resource.m3u8 || '',
                    size: resource.size || '未知',
                    duration: resource.duration || '00:00',
                    updated: resource.updated || resource.updateTime || resource.created || '未知',
                    bitrate: resource.bitrate || resource.bitRate || '未知',
                    resolution: resource.resolution || '未知',
                    framerate: resource.framerate || resource.frameRate || '未知',
                    codec: resource.codec || 'H.264/AAC',
                    category: resource.category || resource.type || '其他',
                    tags: resource.tags || []
                };
            });
        }
        
        // 过滤资源
        function filterResources() {
            if (!appState.searchQuery) {
                appState.filteredResources = [...appState.resources];
            } else {
                appState.filteredResources = appState.resources.filter(resource => {
                    // 搜索名称、描述、分类和标签
                    const searchText = appState.searchQuery.toLowerCase();
                    return (
                        resource.name.toLowerCase().includes(searchText) ||
                        resource.description.toLowerCase().includes(searchText) ||
                        resource.category.toLowerCase().includes(searchText) ||
                        resource.tags.some(tag => tag.toLowerCase().includes(searchText))
                    );
                });
            }
        }
        
        // 更新分页
        function updatePagination() {
            const totalItems = appState.filteredResources.length;
            const pageSize = appState.serverConfig.pageSize;
            appState.totalPages = Math.ceil(totalItems / pageSize);
            
            // 确保当前页在有效范围内
            if (appState.currentPage > appState.totalPages) {
                appState.currentPage = Math.max(1, appState.totalPages);
            }
            
            // 更新分页控件
            document.getElementById('current-page').textContent = appState.currentPage;
            document.getElementById('total-pages').textContent = appState.totalPages;
            
            const prevBtn = document.getElementById('prev-page-btn');
            const nextBtn = document.getElementById('next-page-btn');
            const paginationControls = document.getElementById('pagination-controls');
            
            if (appState.totalPages > 1) {
                paginationControls.style.display = 'block';
                prevBtn.disabled = appState.currentPage <= 1;
                nextBtn.disabled = appState.currentPage >= appState.totalPages;
            } else {
                paginationControls.style.display = 'none';
            }
        }
        
        // 渲染资源列表
        function renderResources() {
            const container = document.getElementById('resources-grid');
            
            // 如果没有资源
            if (appState.filteredResources.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search empty-icon"></i>
                        <h3>未找到资源</h3>
                        <p>${appState.searchQuery ? '没有找到匹配的资源，请尝试其他搜索词' : '资源列表为空'}</p>
                    </div>
                `;
                
                document.getElementById('resource-count').textContent = '(0 个资源)';
                document.getElementById('pagination-controls').style.display = 'none';
                return;
            }
            
            // 计算分页
            const pageSize = appState.serverConfig.pageSize;
            const startIndex = (appState.currentPage - 1) * pageSize;
            const endIndex = Math.min(startIndex + pageSize, appState.filteredResources.length);
            const currentResources = appState.filteredResources.slice(startIndex, endIndex);
            
            // 生成HTML
            let html = '';
            
            currentResources.forEach(resource => {
                html += `
                    <div class="resource-card" data-id="${resource.id}">
                        <div class="resource-thumbnail">
                            <img src="${resource.cover}" alt="${resource.name}" onerror="this.src='https://images.unsplash.com/photo-1536240478700-b869070f9279?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80'">
                            <div class="thumbnail-overlay">
                                <div class="play-btn">
                                    <i class="fas fa-play"></i>
                                </div>
                            </div>
                        </div>
                        <div class="resource-info">
                            <h3 class="resource-title">${resource.name}</h3>
                            <p class="resource-description">${resource.description}</p>
                            
                            <div class="resource-meta">
                                <div class="meta-item">
                                    <i class="far fa-clock"></i>
                                    <span>${resource.duration}</span>
                                </div>
                                <div class="meta-item">
                                    <i class="fas fa-hdd"></i>
                                    <span>${resource.size}</span>
                                </div>
                                <div class="meta-item">
                                    <i class="fas fa-expand-arrows-alt"></i>
                                    <span>${resource.resolution}</span>
                                </div>
                                <div class="meta-item">
                                    <i class="fas fa-tachometer-alt"></i>
                                    <span>${resource.bitrate}</span>
                                </div>
                            </div>
                            
                            <div class="resource-actions">
                                <button class="action-small play-resource-btn" data-id="${resource.id}">
                                    <i class="fas fa-play"></i> 播放
                                </button>
                                <button class="action-small info-resource-btn" data-id="${resource.id}">
                                    <i class="fas fa-info-circle"></i> 详情
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // 更新资源计数
            document.getElementById('resource-count').textContent = `(${appState.filteredResources.length} 个资源)`;
            
            // 添加事件监听
            addResourceEventListeners();
        }
        
        // 添加资源事件监听
        function addResourceEventListeners() {
            // 播放按钮
            document.querySelectorAll('.play-resource-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const resourceId = this.getAttribute('data-id');
                    playResource(resourceId);
                });
            });
            
            // 详情按钮
            document.querySelectorAll('.info-resource-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const resourceId = this.getAttribute('data-id');
                    showResourceInfo(resourceId);
                });
            });
            
            // 点击卡片
            document.querySelectorAll('.resource-card').forEach(card => {
                card.addEventListener('click', function() {
                    const resourceId = this.getAttribute('data-id');
                    playResource(resourceId);
                });
            });
        }
        
        // 播放资源
        function playResource(resourceId) {
            const resource = appState.resources.find(r => r.id == resourceId);
            if (!resource) {
                alert('未找到指定的资源');
                return;
            }
            
            if (!resource.url) {
                alert('该资源没有可用的视频URL');
                return;
            }
            
            // 保存当前视频
            appState.currentVideo = resource;
            
            // 切换到播放器页面
            showPlayerPage();
            
            // 设置播放器标题
            document.getElementById('player-title').textContent = resource.name;
            document.getElementById('player-video-title').textContent = resource.name;
            
            // 更新播放器信息
            updatePlayerInfo('size', resource.size);
            updatePlayerInfo('duration', resource.duration);
            updatePlayerInfo('resolution', resource.resolution);
            updatePlayerInfo('bitrate', resource.bitrate);
            updatePlayerInfo('framerate', resource.framerate);
            updatePlayerInfo('codec', resource.codec);
            updatePlayerInfo('updated', resource.updated);
            updatePlayerInfo('server-status', '准备播放');
            
            // 加载视频
            try {
                appState.player.src({
                    src: resource.url,
                    type: 'application/x-mpegURL'
                });
                
                // 尝试自动播放
                appState.player.play().catch(error => {
                    console.log('自动播放被阻止:', error);
                    updatePlayerInfo('server-status', '视频已加载，点击播放按钮开始播放');
                });
                
            } catch (error) {
                console.error('加载视频失败:', error);
                updatePlayerInfo('server-status', '加载失败: ' + error.message);
            }
        }
        
        // 显示资源详情
        function showResourceInfo(resourceId) {
            const resource = appState.resources.find(r => r.id == resourceId);
            if (!resource) return;
            
            let tagsHtml = '';
            if (resource.tags && resource.tags.length > 0) {
                tagsHtml = resource.tags.map(tag => `<span style="display: inline-block; background: rgba(58, 134, 255, 0.2); color: var(--primary-color); padding: 3px 8px; border-radius: 4px; margin: 2px; font-size: 0.8rem;">${tag}</span>`).join('');
            }
            
            const infoHtml = `
                <div style="background: rgba(0,0,0,0.2); padding: 25px; border-radius: 8px;">
                    <h3 style="margin-bottom: 20px; color: var(--primary-color);">资源详情</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px;">
                        <div>
                            <img src="${resource.cover}" alt="${resource.name}" style="width: 100%; border-radius: 8px;">
                        </div>
                        <div>
                            <h4 style="margin-bottom: 10px;">${resource.name}</h4>
                            <p style="color: #a0a0c0; margin-bottom: 15px;">${resource.description}</p>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                                <div>
                                    <div style="color: #888; font-size: 0.8rem;">分类</div>
                                    <div>${resource.category}</div>
                                </div>
                                <div>
                                    <div style="color: #888; font-size: 0.8rem;">更新时间</div>
                                    <div>${resource.updated}</div>
                                </div>
                            </div>
                            
                            <div style="margin-bottom: 15px;">
                                <div style="color: #888; font-size: 0.8rem;">标签</div>
                                <div style="margin-top: 5px;">${tagsHtml || '无标签'}</div>
                            </div>
                            
                            <div>
                                <div style="color: #888; font-size: 0.8rem;">视频URL</div>
                                <div style="background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; margin-top: 5px;">${resource.url}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px;">
                        <div style="text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                            <div style="color: #888; font-size: 0.8rem;">时长</div>
                            <div style="font-weight: 600; margin-top: 5px;">${resource.duration}</div>
                        </div>
                        <div style="text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                            <div style="color: #888; font-size: 0.8rem;">大小</div>
                            <div style="font-weight: 600; margin-top: 5px;">${resource.size}</div>
                        </div>
                        <div style="text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                            <div style="color: #888; font-size: 0.8rem;">分辨率</div>
                            <div style="font-weight: 600; margin-top: 5px;">${resource.resolution}</div>
                        </div>
                        <div style="text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                            <div style="color: #888; font-size: 0.8rem;">码率</div>
                            <div style="font-weight: 600; margin-top: 5px;">${resource.bitrate}</div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 25px;">
                        <button class="action-btn primary" id="play-from-info" data-id="${resource.id}" style="flex: 1;">
                            <i class="fas fa-play"></i> 播放此视频
                        </button>
                        <button class="action-btn" id="close-info" style="flex: 1;">
                            <i class="fas fa-times"></i> 关闭
                        </button>
                    </div>
                </div>
            `;
            
            // 创建模态框
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '2000';
            modal.style.padding = '20px';
            modal.innerHTML = infoHtml;
            
            document.body.appendChild(modal);
            
            // 添加事件监听
            document.getElementById('play-from-info').addEventListener('click', function() {
                const resourceId = this.getAttribute('data-id');
                document.body.removeChild(modal);
                playResource(resourceId);
            });
            
            document.getElementById('close-info').addEventListener('click', function() {
                document.body.removeChild(modal);
            });
            
            // 点击模态框背景关闭
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    document.body.removeChild(modal);
                }
            });
        }
        
        // 显示加载状态
        function showLoadingState() {
            document.getElementById('resources-grid').innerHTML = `
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin loading-spinner"></i>
                    <h3>正在加载资源列表...</h3>
                    <p>请稍候，正在从服务器获取视频资源</p>
                </div>
            `;
        }
        
        // 显示资源列表页面
        function showResourcesList() {
            document.getElementById('resources-section').style.display = 'block';
            document.getElementById('player-page').style.display = 'none';
            
            // 暂停播放
            if (appState.player && !appState.player.paused()) {
                appState.player.pause();
            }
        }
        
        // 显示播放器页面
        function showPlayerPage() {
            document.getElementById('resources-section').style.display = 'none';
            document.getElementById('player-page').style.display = 'block';
        }
        
        // 更新服务器状态
        function updateServerStatus(status, message) {
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            
            indicator.className = 'status-indicator';
            statusText.textContent = message;
            
            switch(status) {
                case 'connected':
                    indicator.classList.add('connected');
                    break;
                case 'connecting':
                    indicator.classList.add('connecting');
                    break;
                case 'error':
                    indicator.classList.add('error');
                    break;
                default:
                    // disconnected
                    break;
            }
        }
        
        // 更新播放器信息
        function updatePlayerInfo(field, value) {
            const element = document.getElementById(`player-video-${field}`);
            if (element) {
                element.textContent = value;
            }
        }
        
        // 上一页
        function goToPrevPage() {
            if (appState.currentPage > 1) {
                appState.currentPage--;
                renderResources();
                updatePagination();
            }
        }
        
        // 下一页
        function goToNextPage() {
            if (appState.currentPage < appState.totalPages) {
                appState.currentPage++;
                renderResources();
                updatePagination();
            }
        }
    </script>
</body>
</html>
