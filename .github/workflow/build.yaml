name: Build and Release C++ Program

on:
  release:
    types: [published]   # 当你在 GitHub 上发布一个 Release 时触发

jobs:
  build:
    runs-on: ubuntu-latest   # 使用 Ubuntu 环境

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装编译器（Ubuntu 自带 g++，通常无需额外安装，但为了明确我们可以检查一下）
      - name: Install g++ (if needed)
        run: sudo apt-get update && sudo apt-get install -y g++

      # 3. 编译 C++ 程序
      - name: Compile program
        run: g++ -o hello_world main.cpp

      # 4. 上传构建产物作为工件（可选，便于在 Actions 页面查看）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello_world_binary
          path: hello_world

      # 5. 将二进制文件上传到 Release 附件中
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')   # 仅在 tag 触发时执行
        with:
          files: hello_world
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}